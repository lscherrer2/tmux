set-option -sa terminal-overrides ",xterm*:Tc"
set -g xterm-keys on
set -g mouse on

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 2
bind -n M-Down  resize-pane -D 2

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection 
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle 
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind x kill-pane
bind C-s run-shell "~/.tmux/plugins/tmux-resurrect/scripts/save.sh" \; display-message "Session saved!"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'egel/tmux-gruvbox'


set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_status_background "#000000"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right ""

# Automatically set window title to show running application or directory
set-window-option -g automatic-rename on

set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @tmux-gruvbox 'dark'
# set -g @continuum-restore 'on'
# set -g @continuum-save-interval '15'
# set -g @resurrect-session-filter '^(?![0-9]+$).*'

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour238

run '~/.tmux/plugins/tpm/tpm'
